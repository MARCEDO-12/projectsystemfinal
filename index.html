<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>ប្រព័ន្ធគ្រប់គ្រងទំនិញ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">គ្រប់គ្រងបញ្ជីទំនិញ</h2>
    
    <div class="row mb-3">
        <div class="col-md-6">
            <input type="text" id="searchInput" class="form-control" placeholder="ស្វែងរកទំនិញតាមឈ្មោះ..." onkeyup="searchData()">
        </div>
        <div class="col-md-6 text-end">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="clearForm()">+ បន្ថែមទំនិញថ្មី</button>
        </div>
    </div>

    <table class="table table-bordered table-striped bg-white">
        <thead class="table-dark">
            <tr>
                <th>លេខរៀង</th>
                <th>ឈ្មោះទំនិញ</th>
                <th>តម្លៃ</th>
                <th>ចំនួន</th>
                <th>សកម្មភាព</th>
            </tr>
        </thead>
        <tbody id="dataTable">
            </tbody>
    </table>
</div>

<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">បញ្ចូលទិន្នន័យ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editIndex">
                <div class="mb-3">
                    <label>ឈ្មោះទំនិញ</label>
                    <input type="text" id="pName" class="form-control">
                </div>
                <div class="mb-3">
                    <label>តម្លៃ</label>
                    <input type="number" id="pPrice" class="form-control">
                </div>
                <div class="mb-3">
                    <label>ចំនួន</label>
                    <input type="number" id="pQty" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">បោះបង់</button>
                <button type="button" class="btn btn-success" onclick="saveData()">រក្សាទុក</button>
            </div>
        </div>
    </div>
</div>
<footer>
    <a href="#" onclick="logout()"><span>
        <div class="col-md-6 text-end">
            <button class="btn btn-danger" data-bs-toggle="modal" onclick="clearForm()">ចាកចេញ</button>
        </div>
    </span></a>
    <script>
function logout() {
    localStorage.removeItem("isLoggedIn");
    window.location.href = "../HTML/Loginform.html";
}
</script>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../JS/final.js"></script>
<script src="../JS/auth.js"></script>
</body>
</html>
